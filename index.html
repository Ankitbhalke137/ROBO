<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robotics Club @ PW IOI Pune Campus</title>
  <meta name="description"
    content="Robotics Club at PW IOI Pune Campus — Building the Machines of Tomorrow. Explore our projects, events, team and more." />
  <meta name="theme-color" content="#020408" />
  <meta property="og:title" content="Robotics Club @ PW IOI Pune Campus" />
  <meta property="og:description"
    content="Building the Machines of Tomorrow. Explore our projects, events, team and more." />
  <meta property="og:type" content="website" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-QLJ5X62L1T"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-QLJ5X62L1T');
  </script>
</head>

<body>
  <!-- Scroll Progress -->
  <div id="scroll-progress"></div>

  <div id="app"></div>

  <!-- Admin Login Modal -->
  <div id="admin-login-modal" class="modal" style="display:none;">
    <div class="modal-content card">
      <span class="close-modal" id="close-login">&times;</span>
      <h2 style="margin-bottom: 1rem; color: #00f5d4;">Admin Login</h2>
      <form id="admin-login-form">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="admin-email" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="admin-pass" class="form-input" required>
        </div>
        <p id="admin-login-error" style="color:red;font-size:0.8rem;margin-bottom:1rem;display:none;"></p>
        <button type="submit" class="btn btn-primary" style="width:100%">Login</button>
      </form>
    </div>
  </div>

  <!-- Admin Dashboard Modal (Requests) -->
  <div id="admin-dashboard-modal" class="modal" style="display:none;">
    <div class="modal-content card" style="max-width:800px;">
      <span class="close-modal" id="close-dashboard">&times;</span>
      <h2 style="margin-bottom: 1rem; color: #00f5d4;">Admin Dashboard - Join Requests</h2>
      <button id="admin-logout-btn" class="btn btn-outline btn-sm" style="margin-bottom:1rem;">Logout</button>
      <div id="admin-requests-list"
        style="max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem;">
        <p style="color:var(--text-muted)">Loading requests...</p>
      </div>
    </div>
  </div>

  <noscript>
    <div
      style="padding: 2rem; max-width: 600px; margin: 0 auto; text-align: center; font-family: sans-serif; color: #e2f0fb; background-color: #020408; height: 100vh; display: flex; flex-direction: column; justify-content: center;">
      <h1 style="color: #00f5d4; margin-bottom: 1rem;">Robotics Club @ PW IOI Pune Campus</h1>
      <p style="font-size: 1.1rem; line-height: 1.6;">It appears that JavaScript is disabled in your browser. Our
        website relies on JavaScript to provide a dynamic and interactive experience.</p>
      <p style="margin-top: 1rem; color: #6b8fa8;">Please enable JavaScript or switch to a supported browser to view our
        projects, events, and team information.</p>
    </div>
  </noscript>

  <!-- Particle canvas -->
  <canvas id="particle-canvas"></canvas>

  <script type="module" src="app.js"></script>
</body>

</html>
